name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Capacitor Sync
        run: |
          npx cap sync android --verbose > cap_sync.log 2>&1 || (cat cap_sync.log && exit 1)

      - name: Compile Debug APK
        run: |
          cd android
          ./gradlew assembleDebug > ../gradle_build.log 2>&1 || (cat ../gradle_build.log && exit 1)

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-builder-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Push Debug Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b build-debug || git checkout build-debug
          git add -f *.log || true
          git commit -m "build failure logs"
          git push origin build-debug --force
